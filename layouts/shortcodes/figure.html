{{- $thumb := .Get "thumb" | default (.Get "src") -}}
{{- $full  := .Get "link"  | default (.Get "src") -}}

{{- $thumbURL := cond (hasPrefix $thumb "http") $thumb ($thumb | relURL) -}}
{{- $fullURL  := cond (hasPrefix $full  "http") $full  ($full  | relURL) -}}

<div class="box{{ with .Get "caption-position" }} fancy-figure caption-position-{{.}}{{end}}{{ with .Get "caption-effect" }} caption-effect-{{.}}{{end}}"
     {{ with .Get "width" }}style="max-width:{{.}}"{{end}}>
  <figure itemprop="associatedMedia" itemscope itemtype="http://schema.org/ImageObject">
    <div class="img"{{ if .Parent }} style="background-image:url('{{ $thumbURL }}');"{{ end }}{{ with .Get "size" }} data-size="{{.}}"{{ end }}>
      <img itemprop="thumbnail" src="{{ $thumbURL }}"
           alt="{{ .Get "alt" | default (.Get "caption") | default "" }}">
    </div>

    <!-- IMPORTANT: uniquely identifiable link for PhotoSwipe -->
    <a class="pswp-content" href="{{ $fullURL }}" itemprop="contentUrl" {{ with .Get "size" }}data-size="{{.}}"{{ end }}></a>

    {{- with .Get "caption" }}
      <figcaption><p>{{ . }}</p></figcaption>
    {{- end }}
  </figure>
</div>
